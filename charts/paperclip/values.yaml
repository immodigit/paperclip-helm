replicaCount: 1

image:
  repository: ghcr.io/immodigit/paperclip
  tag: latest
  pullPolicy: Always

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Public URL for the Paperclip instance (used for OAuth redirects, links, etc.)
publicURL: ""

serviceAccount:
  annotations: {}

podAnnotations: {}
podLabels: {}

strategy:
  type: RollingUpdate

service:
  type: ClusterIP
  port: 3100

ingress:
  enabled: false
  className: traefik
  annotations: {}
  hosts:
    - host: paperclip.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    memory: 512Mi
  limits:
    memory: 512Mi

env:
  PORT: "3100"
  SERVE_UI: "true"
  PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
  PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"

# Additional env vars as list (supports valueFrom)
extraEnv: []

# envFrom references (ConfigMaps, Secrets)
envFrom: []

# Reference to an existing secret containing BETTER_AUTH_SECRET.
# If empty, a secret named <fullname>-secret is expected.
existingSecret: ""

# CNPG database settings
cnpg:
  enabled: true
  instances: 1
  database: paperclip
  owner: paperclip
  storage:
    size: 10Gi
    storageClass: ""
  resources:
    requests:
      memory: 256Mi
    limits:
      memory: 256Mi
  postgresql:
    parameters:
      # pgtune: web app, 256MB RAM, 1 CPU, SSD, 25 connections
      shared_buffers: "64MB"
      effective_cache_size: "192MB"
      work_mem: "1MB"
      maintenance_work_mem: "32MB"
      random_page_cost: "1.1"
      effective_io_concurrency: "200"
      huge_pages: "off"
  backup:
    enabled: false
    schedule: "0 0 2 * * *"
    barmanObjectName: ""

persistence:
  enabled: true
  size: 5Gi
  storageClass: ""
  accessMode: ReadWriteOnce
  existingClaim: ""

networkPolicy:
  enabled: false

sidecars: []
initContainers: []

extraVolumes: []
extraVolumeMounts: []

podSecurityContext:
  fsGroup: 1000

securityContext: {}
# For images that don't use gosu/su-exec, you can harden:
# securityContext:
#   runAsUser: 1000
#   runAsGroup: 1000
#   allowPrivilegeEscalation: false
#   capabilities:
#     drop: [ALL]

nodeSelector: {}
tolerations: []
affinity: {}
